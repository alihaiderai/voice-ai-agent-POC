<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice AI - Phone Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .section h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            color: #555;
            margin-bottom: 5px;
            font-size: 14px;
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .phone-info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #2196f3;
        }

        .phone-info strong {
            color: #1976d2;
        }

        .hint {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📞 Voice AI Phone Demo</h1>
        <p class="subtitle">Test inbound and outbound calls with AI agent</p>

        <!-- Inbound Call Info -->
        <div class="phone-info">
            <strong>📥 Inbound Calls:</strong><br>
            Call <strong>+1 (978) 570-8547</strong> to talk with AI agent
        </div>

        <!-- Outbound Call Section -->
        <div class="section">
            <h2>📤 Make Outbound Call</h2>
            
            <div class="form-group">
                <label for="phoneNumber">Phone Number</label>
                <input 
                    type="tel" 
                    id="phoneNumber" 
                    placeholder="+923070614159"
                    value="+92"
                >
                <div class="hint">Format: +92XXXXXXXXXX (with country code)</div>
            </div>

            <div class="form-group">
                <label for="message">Message to Speak</label>
                <textarea 
                    id="message" 
                    placeholder="Hello! This is a test call from our AI voice agent. How are you today?"
                >Hello! This is a test call from our AI voice agent.</textarea>
            </div>

            <button onclick="makeCall()" id="callBtn">
                📞 Make Call
            </button>

            <div id="status" class="status"></div>
        </div>

        <!-- Test Connection -->
        <div class="section">
            <h2>🔧 System Status</h2>
            <button onclick="testConnection()" id="testBtn">
                Test Connection
            </button>
            <div id="testStatus" class="status"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';

        async function makeCall() {
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            const message = document.getElementById('message').value.trim();
            const statusDiv = document.getElementById('status');
            const callBtn = document.getElementById('callBtn');

            // Validation
            if (!phoneNumber || phoneNumber === '+92') {
                showStatus(statusDiv, 'error', '❌ Please enter a valid phone number');
                return;
            }

            if (!message) {
                showStatus(statusDiv, 'error', '❌ Please enter a message');
                return;
            }

            // Disable button
            callBtn.disabled = true;
            callBtn.textContent = '📞 Calling...';
            showStatus(statusDiv, 'info', '📞 Initiating call...');

            try {
                const response = await fetch(
                    `${API_URL}/api/phone/outbound?to_number=${encodeURIComponent(phoneNumber)}&message=${encodeURIComponent(message)}`,
                    { method: 'POST' }
                );

                const data = await response.json();

                if (data.success) {
                    showStatus(statusDiv, 'success', 
                        `✅ Call initiated successfully!<br>
                        Call SID: ${data.call_sid}<br>
                        Status: ${data.status}<br>
                        To: ${data.to}`
                    );
                } else {
                    showStatus(statusDiv, 'error', `❌ Call failed: ${data.error}`);
                }
            } catch (error) {
                showStatus(statusDiv, 'error', `❌ Error: ${error.message}`);
            } finally {
                callBtn.disabled = false;
                callBtn.textContent = '📞 Make Call';
            }
        }

        async function testConnection() {
            const statusDiv = document.getElementById('testStatus');
            const testBtn = document.getElementById('testBtn');

            testBtn.disabled = true;
            testBtn.textContent = 'Testing...';
            showStatus(statusDiv, 'info', '🔄 Testing connection...');

            try {
                const response = await fetch(`${API_URL}/api/phone/test`);
                const data = await response.json();

                if (data.status === 'ready') {
                    showStatus(statusDiv, 'success', 
                        `✅ System Ready!<br>
                        Phone: ${data.phone_number}<br>
                        Account: Configured`
                    );
                } else {
                    showStatus(statusDiv, 'error', `❌ Error: ${data.error || 'Not configured'}`);
                }
            } catch (error) {
                showStatus(statusDiv, 'error', `❌ Connection failed: ${error.message}`);
            } finally {
                testBtn.disabled = false;
                testBtn.textContent = 'Test Connection';
            }
        }

        function showStatus(element, type, message) {
            element.className = `status ${type}`;
            element.innerHTML = message;
            element.style.display = 'block';
        }

        // Test connection on load
        window.addEventListener('load', () => {
            setTimeout(testConnection, 500);
        });
    </script>
</body>
</html>
